server:
  port: 8080

spring:
  config:
    import: optional:configserver:http://localhost:8888
  application:
    name: msvc-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: students
              uri: lb://msvc-student
              predicates:
                - Path=/api/student/**
            - id: courses
              uri: lb://msvc-course
              predicates:
                - Path=/api/course/**


